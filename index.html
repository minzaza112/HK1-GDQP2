<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trắc nghiệm Quốc phòng - An ninh</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --correct-color: #28a745;
            --wrong-color: #dc3545;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            line-height: 1.6;
        }

        h1 {
            text-align: center;
            font-size: 22px;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        select {
            width: 100%;
            max-width: 400px;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background-color: #fff;
            outline: none;
        }

        #quiz-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .question-card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .question-title {
            font-weight: bold;
            font-size: 17px;
            margin-bottom: 15px;
            margin-top: 0;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 15px;
            text-align: left;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
            word-wrap: break-word;
        }

        .option-btn:active {
            background-color: #e2e6ea;
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.9;
        }

        .btn-load-more {
            display: none;
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 86, 179, 0.2);
        }

        .btn-load-more:active {
            background-color: #004494;
        }

        .progress-text {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>Ôn Tập Trắc Nghiệm</h1>

    <div class="controls">
        <select id="lesson-select" onchange="startLesson()">
            <option value="none">-- Chọn bài học --</option>
            <option value="bai1">Bài 1: Phòng chống chiến lược DBHB</option>
            <option value="bai2">Bài 2: Vấn đề dân tộc, tôn giáo</option>
            <option value="bai3">Bài 3: Phòng chống vi phạm pháp luật bảo vệ môi trường</option>
            <option value="bai4">Bài 4: Phòng chống vi phạm pháp luật an toàn giao thông</option>
            <option value="bai5">Bài 5: Phòng chống tội phạm và tệ nạn xã hội</option>
            <option value="all" style="font-weight: bold; color: var(--primary-color);">🔥 Tổng hợp: Tất cả các bài</option>
        </select>
    </div>

    <div class="progress-text" id="progress-text"></div>

    <div id="quiz-container"></div>

    <div style="display: flex; gap: 10px; margin-top: 20px;">
        <button class="btn-load-more" id="random-btn" onclick="showRandomQuestion()" style="display: none; flex: 1;">Câu ngẫu nhiên</button>
        <button class="btn-load-more" id="add-btn" onclick="expandPool()" style="display: none; flex: 1; background-color: #28a745;">Thêm 5 câu mới</button>
    </div>

    <script src="data.js"></script>

    <script>
        let currentLessonQuestions = [];
        let activePoolSize = 0;
        const POOL_INCREMENT = 5;
        let isAnswered = false;

        // --- CÁC BIẾN PHỤC VỤ LOGIC MỚI ---
        let questionStartTime = 0; // Lưu thời gian bắt đầu câu hỏi
        const TIME_THRESHOLD = 8500; // Ngưỡng thời gian "lâu" (7000ms = 7 giây)

        // Hàm xáo trộn mảng (dùng cho đáp án)
        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Khởi tạo hoặc chuẩn bị câu hỏi (thêm thuộc tính weight nếu chưa có)
        function prepareQuestions(questions) {
            return questions.map(q => {
                if (q.weight === undefined) {
                    q.weight = 1; // Trọng số mặc định ban đầu là 1
                }
                return q;
            });
        }

        // Bắt đầu bài học
        function startLesson() {
            const lessonKey = document.getElementById('lesson-select').value;
            const container = document.getElementById('quiz-container');
            const randomBtn = document.getElementById('random-btn');
            const addBtn = document.getElementById('add-btn');
            const progressText = document.getElementById('progress-text');

            container.innerHTML = '';
            isAnswered = false;

            if (lessonKey === 'none') {
                randomBtn.style.display = 'none';
                addBtn.style.display = 'none';
                progressText.innerText = '';
                return;
            }

            if (lessonKey === 'all') {
                let allQuestions = [];
                for (let key in database) {
                    allQuestions = allQuestions.concat(database[key]);
                }
                // Xáo trộn danh sách tổng hợp
                currentLessonQuestions = prepareQuestions(shuffleArray(allQuestions));
            } else {
                // Lấy danh sách bài cụ thể sâu và giữ nguyên thứ tự gốc để cắt slice theo pool
                currentLessonQuestions = prepareQuestions(database[lessonKey]);
            }

            activePoolSize = Math.min(POOL_INCREMENT, currentLessonQuestions.length);
            randomBtn.style.display = 'block';

            showRandomQuestion();
        }

        function expandPool() {
            activePoolSize = Math.min(activePoolSize + POOL_INCREMENT, currentLessonQuestions.length);
            showRandomQuestion();
        }

        // HÀM QUAN TRỌNG: Bốc ngẫu nhiên dựa trên trọng số (Weight)
        function getWeightedRandomQuestion() {
            // Chỉ lấy các câu hỏi nằm trong phạm vi Pool đang mở khóa
            const availableQuestions = currentLessonQuestions.slice(0, activePoolSize);

            // Tính tổng tất cả trọng số của các câu đang có
            const totalWeight = availableQuestions.reduce((sum, q) => sum + q.weight, 0);

            // Quay số ngẫu nhiên từ 0 đến tổng trọng số
            let randomNum = Math.random() * totalWeight;

            // Duyệt qua từng câu, trừ dần trọng số để tìm câu trúng thưởng
            for (let i = 0; i < availableQuestions.length; i++) {
                randomNum -= availableQuestions[i].weight;
                if (randomNum <= 0) {
                    return availableQuestions[i]; // Trả về câu hỏi trúng giải
                }
            }
            return availableQuestions[0]; // Phương án dự phòng
        }

        function showRandomQuestion() {
            const container = document.getElementById('quiz-container');
            const addBtn = document.getElementById('add-btn');
            const progressText = document.getElementById('progress-text');

            if (activePoolSize === 0) return;

            isAnswered = false;
            container.innerHTML = '';

            // Thay vì random index đều nhau, ta dùng hàm bốc theo trọng số mới viết ở trên
            const qData = getWeightedRandomQuestion();

            // Ghi lại thời gian bắt đầu hiện câu hỏi (tính theo miligiây)
            questionStartTime = Date.now();

            const card = document.createElement('div');
            card.className = 'question-card';

            // Hiển thị thêm thông tin Độ khó/Trọng số hiện tại của câu hỏi để bạn dễ theo dõi
            const debugInfo = document.createElement('span');
            debugInfo.style.fontSize = '12px';
            debugInfo.style.color = '#999';
            debugInfo.style.float = 'right';
            debugInfo.innerText = `Độ ưu tiên: ${qData.weight}`;
            card.appendChild(debugInfo);

            const title = document.createElement('h3');
            title.className = 'question-title';
            title.innerText = `Câu hỏi: ${qData.q}`;
            card.appendChild(title);

            const optionsContainer = document.createElement('div');
            optionsContainer.className = 'options-container';

            const shuffledOptions = shuffleArray(qData.a);

            shuffledOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.text;

                btn.onclick = function(e) {
                    if (isAnswered) return;
                    e.stopPropagation();

                    // Tính thời gian trả lời (s)
                    const timeTaken = Date.now() - questionStartTime;
                    const allBtns = optionsContainer.querySelectorAll('.option-btn');

                    allBtns.forEach(b => {
                        b.style.cursor = 'default';
                        b.style.opacity = '0.9';
                    });

                    let statusText = "";

                    if (opt.correct) {
                        btn.style.backgroundColor = 'var(--correct-color)';
                        btn.style.color = 'white';
                        btn.style.borderColor = 'var(--correct-color)';

                        // Kiểm tra xem có làm quá thời gian quy định không
                        if (timeTaken > TIME_THRESHOLD) {
                            qData.weight += 1; // Đúng nhưng lâu -> Tăng nhẹ tần suất
                            statusText = `Đúng nhưng hơi chậm (${(timeTaken/1000).toFixed(1)}s). Câu này sẽ xuất hiện lại sớm hơn!`;
                        } else {
                            // Đúng và nhanh -> Giảm bớt trọng số (tối thiểu là 1 để không bị mất hẳn)
                            if (qData.weight > 1) qData.weight -= 1;
                            statusText = `Xuất sắc! Trả lời đúng trong ${(timeTaken/1000).toFixed(1)}s.`;
                        }
                    } else {
                        btn.style.backgroundColor = 'var(--wrong-color)';
                        btn.style.color = 'white';
                        btn.style.borderColor = 'var(--wrong-color)';

                        allBtns.forEach(b => {
                            if(shuffledOptions.find(o => o.text === b.innerText).correct) {
                                b.style.backgroundColor = 'var(--correct-color)';
                                b.style.color = 'white';
                            }
                        });

                        // TRẢ LỜI SAI -> Tăng mạnh trọng số lên để câu này liên tục xuất hiện lại
                        qData.weight += 2;
                        statusText = `Chưa chính xác! Câu này đã được tăng tỷ lệ xuất hiện để bạn ôn tập lại.`;
                    }

                    isAnswered = true;
                    progressText.innerHTML = `<span style="color:#666; font-size:14px;">${statusText}</span><br>Đang mở khóa: ${activePoolSize}/${currentLessonQuestions.length} câu <br><strong style="color:var(--primary-color)">(Bấm vào bất kỳ đâu để tiếp tục)</strong>`;
                };
                optionsContainer.appendChild(btn);
            });

            card.appendChild(optionsContainer);
            container.appendChild(card);

            if (activePoolSize >= currentLessonQuestions.length) {
                addBtn.style.display = 'none';
                progressText.innerText = `Đang random toàn bộ ${currentLessonQuestions.length} câu của bài`;
            } else {
                addBtn.style.display = 'block';
                progressText.innerText = `Đang random trong ${activePoolSize} câu (Tổng bài có ${currentLessonQuestions.length} câu)`;
            }
        }

        document.addEventListener('click', function(e) {
            if (isAnswered) {
                if (e.target.id === 'add-btn' || e.target.id === 'lesson-select' || e.target.id === 'random-btn') {
                    return;
                }
                showRandomQuestion();
            }
        });
    </script>
</body>
</html>
